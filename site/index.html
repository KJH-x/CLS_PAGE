<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>朝陇山图片归档</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-left">
      <h1 class="site-title">朝陇山图片归档</h1>
      <p class="site-subtitle">最近更新的 <span id="headerCount">—</span> 条动态 · <span id="headerTime">—</span></p>
    </div>
    <div class="header-controls">
      <button class="theme-toggle" id="themeToggle" title="切换主题" aria-label="切换深浅色主题">
        <span class="icon-sun">☀</span>
        <span class="icon-moon">☾</span>
      </button>
    </div>
  </div>
</header>

<div class="search-bar" id="searchBar">
  <input
    type="search"
    id="searchInput"
    class="search-input"
    placeholder="搜索标题、标签或日期，例如 7周年"
    autocomplete="off"
    aria-label="搜索动态"
  />
  <button class="search-clear" id="searchClear" hidden aria-label="清除搜索">✕</button>
  <span class="search-status" id="searchStatus"></span>
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-cat="上新">上新</button>
  <button class="filter-btn" data-cat="余量上架">余量上架</button>
  <button class="filter-btn" data-cat="">全部</button>
</div>

<main class="main-content">
  <div class="loading-state" id="loadingState" hidden>
    <div class="skeleton-card" aria-hidden="true">
      <div class="skel-line w-30"></div>
      <div class="skel-line w-60"></div>
      <div class="skel-line w-40"></div>
    </div>
    <div class="skeleton-card" aria-hidden="true">
      <div class="skel-line w-25"></div>
      <div class="skel-line w-55"></div>
      <div class="skel-line w-35"></div>
    </div>
  </div>

  <div class="error-state" id="errorState" hidden>
    <div class="error-icon">!</div>
    <p class="error-message" id="errorMessage"></p>
    <button class="error-retry" id="errorRetry">重试</button>
  </div>

  <div class="empty-state" id="emptyState" hidden>
    <p>暂无归档动态</p>
    <p class="empty-sub">首次采集完成后会在这里显示内容</p>
  </div>

  <div class="timeline" id="timeline" role="list"></div>

  <div class="no-results" id="noResults" hidden>
    <p>没有匹配的动态</p>
    <button class="error-retry" id="clearSearchBtn">清除搜索</button>
  </div>
</main>

<footer class="site-footer">
  <p>归档时间 <time id="footerTime"></time> &middot; 共 <span id="footerCount"></span> 条动态</p>
</footer>

<div class="lightbox" id="lightbox" hidden>
  <button class="lb-close" id="lbClose" aria-label="关闭查看器">✕</button>
  <button class="lb-nav lb-prev" id="lbPrev" aria-label="上一张">‹</button>
  <button class="lb-nav lb-next" id="lbNext" aria-label="下一张">›</button>
  <div class="lb-counter" id="lbCounter"></div>
  <div class="lb-content" id="lbContent">
    <div class="lb-stage" id="lbStage"></div>
  </div>
  <div class="lb-tip" id="lbTip" hidden>滚轮缩放 &middot; 拖拽移动 &middot; Shift+滚轮上下 &middot; 方向键切换</div>
  <div class="lb-zoom-badge" id="lbZoomBadge" hidden></div>
  <div class="lb-thumb-strip" id="lbThumbStrip"></div>
</div>

<script src="/js/config.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/search.js"></script>
<script src="/js/viewer.js"></script>
<script src="/js/app.js"></script>

</body>
</html>
